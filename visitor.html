<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訪客登記系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
        }
        .registration-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        @keyframes bounce-short {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-bounce-short { animation: bounce-short 0.5s ease-out; }
        #qrcode img { margin: 0 auto; border: 8px solid white; border-radius: 0.5rem; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- QR Code 按鈕 -->
    <button onclick="openQRModal()" class="fixed top-6 right-6 bg-white/80 backdrop-blur-sm p-3 rounded-full shadow-lg hover:bg-white transition-all z-[100] group">
        <svg class="w-6 h-6 text-slate-600 group-hover:text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
        <span class="absolute right-14 top-1/2 -translate-y-1/2 bg-slate-800 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">手機填寫</span>
    </button>

    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">訪客登記</h1>
            <p id="sync-text" class="text-slate-400 text-sm mt-2 italic">正在連接系統...</p>
        </div>

        <div class="registration-card p-8">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1.5 text-left">訪客姓名</label>
                    <input type="text" id="visitor-name" class="w-full border-2 border-gray-100 rounded-xl p-3 focus:border-blue-500 outline-none transition-all bg-gray-50 text-lg" placeholder="請輸入姓名">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1.5 text-left">公司</label>
                    <input type="text" id="visitor-company" class="w-full border-2 border-gray-100 rounded-xl p-3 focus:border-blue-500 outline-none transition-all bg-gray-50 text-lg" placeholder="請輸入公司名稱">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1.5 text-left">受訪同仁</label>
                    <input type="text" id="visitor-host" class="w-full border-2 border-gray-100 rounded-xl p-3 focus:border-blue-500 outline-none transition-all bg-gray-50 text-lg" placeholder="受訪者姓名">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1.5 text-left">拜訪目的</label>
                    <select id="visitor-purpose" onchange="toggleOtherInput()" class="w-full border-2 border-gray-100 rounded-xl p-3 focus:border-blue-500 outline-none bg-gray-50 text-lg cursor-pointer">
                        <option value="">請選擇目的</option>
                        <option value="面試">面試</option>
                        <option value="參加會議">參加會議</option>
                        <option value="送貨">送貨</option>
                        <option value="施工">施工</option>
                        <option value="洽公">洽公</option>
                        <option value="商談">商談</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div id="other-purpose-container" class="hidden">
                    <label class="block text-sm font-bold text-gray-700 mb-1.5 text-left">原因說明</label>
                    <input type="text" id="visitor-purpose-other" class="w-full border-2 border-blue-100 rounded-xl p-3 focus:border-blue-500 outline-none bg-blue-50" placeholder="請填寫具體原因">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1.5 text-left">聯絡電話</label>
                    <input type="tel" id="visitor-phone" class="w-full border-2 border-gray-100 rounded-xl p-3 focus:border-blue-500 outline-none bg-gray-50 text-lg" placeholder="0912345678" maxlength="10">
                </div>
                <button onclick="submitRegistration()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold text-xl shadow-lg transform active:scale-95 transition-all mt-4">提交登記</button>
            </div>
        </div>

        <div id="qr-modal" class="hidden fixed inset-0 flex items-center justify-center p-4 z-[150] backdrop-blur-sm bg-slate-900/60">
            <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl text-center">
                <h3 class="text-2xl font-bold text-slate-800 mb-2">手機登記</h3>
                <p class="text-slate-500 text-sm mb-6">掃描下方 QR Code 即可使用手機填寫</p>
                <div id="qrcode" class="mb-6 flex justify-center"></div>
                <button onclick="closeQRModal()" class="w-full bg-slate-100 text-slate-600 py-3 rounded-xl font-bold hover:bg-slate-200 transition-colors">返回</button>
            </div>
        </div>

        <div id="success-modal" class="hidden fixed inset-0 flex items-center justify-center p-4 z-50 text-center">
            <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
            <div class="bg-white rounded-2xl p-8 text-center shadow-2xl relative animate-bounce-short max-w-xs w-full">
                <div class="w-16 h-16 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl font-bold">✓</div>
                <h2 class="text-2xl font-bold text-gray-800 mb-2">登記成功</h2>
                <p class="text-gray-600">請向櫃檯領取訪客證。</p>
            </div>
        </div>
        <div id="toast" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-full shadow-lg z-50 text-sm font-bold"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        let db = null;
        let isCloudMode = false;
        const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'visitor-system';

        if (configStr) {
            try {
                const config = JSON.parse(configStr);
                const app = initializeApp(config);
                db = getFirestore(app);
                const auth = getAuth(app);
                signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        isCloudMode = true;
                        document.getElementById('sync-text').innerText = "連線狀態：雲端連動中";
                        document.getElementById('sync-text').className = "text-emerald-500 text-sm mt-2";
                    }
                });
            } catch (e) { setupLocal(); }
        } else { setupLocal(); }

        function setupLocal() {
            document.getElementById('sync-text').innerText = "連線狀態：本機互連模式";
            document.getElementById('sync-text').className = "text-blue-500 text-sm mt-2";
            isCloudMode = false;
        }

        window.toggleOtherInput = () => {
            const p = document.getElementById('visitor-purpose').value;
            document.getElementById('other-purpose-container').classList.toggle('hidden', p !== '其他');
        };

        window.openQRModal = () => {
            document.getElementById('qr-modal').classList.remove('hidden');
            const qr = document.getElementById('qrcode'); qr.innerHTML = "";
            new QRCode(qr, { text: window.location.href, width: 200, height: 200 });
        };
        window.closeQRModal = () => document.getElementById('qr-modal').classList.add('hidden');

        window.submitRegistration = async function() {
            const name = document.getElementById('visitor-name').value.trim();
            const company = document.getElementById('visitor-company').value.trim();
            const host = document.getElementById('visitor-host').value.trim();
            const pSelect = document.getElementById('visitor-purpose');
            const pOther = document.getElementById('visitor-purpose-other').value.trim();
            const phone = document.getElementById('visitor-phone').value.trim();
            let finalP = pSelect.value;

            if (!name || !company || !host || !finalP || !/^09\d{8}$/.test(phone)) return showToast('請填寫完整並確認電話');
            if (finalP === '其他') finalP = `其他: ${pOther}`;

            const record = {
                name, company, host, purpose: finalP, phone, status: 'pending',
                registeredAt: new Date().toLocaleString('zh-TW', { hour12: false }),
                registeredAtRaw: Date.now()
            };

            if (isCloudMode) {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'visitorRecords'), record);
            } else {
                let local = JSON.parse(localStorage.getItem('visitorRecords') || '[]');
                local.push({ id: Date.now().toString(), ...record });
                localStorage.setItem('visitorRecords', JSON.stringify(local));
                window.dispatchEvent(new Event('storage'));
            }

            document.querySelectorAll('input').forEach(i => i.value = '');
            pSelect.value = '';
            document.getElementById('success-modal').classList.remove('hidden');
            setTimeout(() => document.getElementById('success-modal').classList.add('hidden'), 3000);
        };

        function showToast(msg) {
            const t = document.getElementById('toast'); t.innerText = msg; t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>

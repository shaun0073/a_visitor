<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>櫃檯管理系統 - 互連版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .admin-card { background: white; border-radius: 1rem; box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #qrcode img { margin: 0 auto; border: 8px solid white; border-radius: 0.5rem; }
    </style>
</head>
<body class="min-h-screen">

    <!-- 登入驗證 -->
    <div id="auth-overlay" class="fixed inset-0 bg-slate-900 z-[100] flex items-center justify-center p-4 text-center">
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-sm w-full">
            <h1 class="text-2xl font-bold text-gray-800 mb-6">管理員登入</h1>
            <p class="text-gray-500 text-sm mb-4">預設密碼：admin123</p>
            <input type="password" id="login-password" class="w-full border-2 border-gray-100 rounded-xl p-3 mb-4 text-center text-xl tracking-widest focus:border-blue-500 outline-none" placeholder="密碼" onkeyup="if(event.key==='Enter') verifyLogin()">
            <div id="login-error" class="hidden text-red-500 text-sm mb-4">密碼不正確</div>
            <button onclick="verifyLogin()" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold hover:bg-slate-700 transition-colors">進入系統</button>
        </div>
    </div>

    <!-- 主要管理介面 -->
    <div id="admin-main" class="hidden max-w-[90rem] mx-auto p-4 md:p-8 opacity-0 transition-opacity duration-500">
        <div class="flex justify-between items-center mb-8 text-left">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">櫃檯管理控制台</h1>
                <p id="sync-text" class="text-sm mt-1">連線模式確認中...</p>
            </div>
            <div class="flex gap-2">
                <button onclick="openQRModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm shadow-sm hover:bg-blue-700 transition-colors">顯示登記 QR</button>
                <button onclick="exportToCSV()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm shadow-sm hover:bg-emerald-700 transition-colors">匯出 Excel</button>
                <button onclick="location.reload()" class="bg-red-50 text-red-600 px-4 py-2 rounded-lg text-sm font-bold hover:bg-red-100 transition-colors">登出</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="admin-card p-6">
                <h2 class="text-lg font-bold text-slate-700 border-b pb-4 mb-4 text-left">
                    <span class="w-2 h-6 bg-orange-500 rounded mr-3"></span>
                    待處理登記 (<span id="count-pending">0</span>)
                </h2>
                <div id="pending-list" class="space-y-4 max-h-[400px] overflow-y-auto no-scrollbar"></div>
            </div>
            <div class="admin-card p-6">
                <h2 class="text-lg font-bold text-slate-700 border-b pb-4 mb-4 text-left">
                    <span class="w-2 h-6 bg-blue-500 rounded mr-3"></span>
                    場內訪客 (<span id="count-active">0</span>)
                </h2>
                <div id="active-list" class="space-y-4 max-h-[400px] overflow-y-auto no-scrollbar"></div>
            </div>
        </div>

        <!-- 歷史紀錄總表 -->
        <div class="admin-card p-6 mt-8">
            <h2 class="text-lg font-bold text-slate-700 mb-6 border-b pb-4 text-left">歷史紀錄總表</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left text-slate-500">
                    <thead class="bg-slate-50 text-slate-400 uppercase text-xs">
                        <tr>
                            <th class="px-4 py-3">證號</th>
                            <th class="px-4 py-3">訪客</th>
                            <th class="px-4 py-3">公司</th>
                            <th class="px-4 py-3">受訪同仁</th>
                            <th class="px-4 py-3">目的</th>
                            <th class="px-4 py-3">電話</th>
                            <th class="px-4 py-3">進入時間</th>
                            <th class="px-4 py-3">簽退時間</th>
                        </tr>
                    </thead>
                    <tbody id="history-table" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- QR Code 彈窗 -->
    <div id="qr-modal" class="hidden fixed inset-0 flex items-center justify-center p-4 z-[200] backdrop-blur-sm bg-slate-900/60">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl text-center">
            <h3 class="text-xl font-bold mb-4">展示 QR Code 給訪客</h3>
            <div id="qrcode" class="mb-6 flex justify-center"></div>
            <button onclick="document.getElementById('qr-modal').classList.add('hidden')" class="w-full bg-slate-100 py-3 rounded-xl font-bold text-slate-600">關閉</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        let records = [];
        let db = null;
        let isCloud = false;
        const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'visitor-system';

        window.verifyLogin = () => {
            if (document.getElementById('login-password').value === 'admin123') {
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('admin-main').classList.remove('hidden');
                setTimeout(() => document.getElementById('admin-main').classList.add('opacity-100'), 50);
                init();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        };

        async function init() {
            if (configStr) {
                try {
                    const app = initializeApp(JSON.parse(configStr));
                    db = getFirestore(app);
                    const auth = getAuth(app);
                    signInAnonymously(auth);
                    onAuthStateChanged(auth, u => { 
                        if(u) { 
                            isCloud = true; 
                            startCloud(); 
                        } 
                    });
                } catch (e) { startLocal(); }
            } else { startLocal(); }
        }

        function startCloud() {
            document.getElementById('sync-text').innerText = "連線模式：雲端同步中";
            document.getElementById('sync-text').className = "text-emerald-500 text-sm mt-1";
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'visitorRecords'), (s) => {
                records = s.docs.map(d => ({ id: d.id, ...d.data() }));
                refresh();
            });
        }

        function startLocal() {
            document.getElementById('sync-text').innerText = "連線模式：本機互連模式";
            document.getElementById('sync-text').className = "text-blue-500 text-sm mt-1";
            const load = () => { 
                records = JSON.parse(localStorage.getItem('visitorRecords') || '[]'); 
                refresh(); 
            };
            load(); 
            window.addEventListener('storage', load);
        }

        function refresh() {
            const pending = records.filter(r => r.status === 'pending').sort((a,b) => b.registeredAtRaw - a.registeredAtRaw);
            const active = records.filter(r => r.status === 'active').sort((a,b) => b.checkInTimeRaw - a.checkInTimeRaw);
            const history = records.filter(r => r.status !== 'pending').sort((a,b) => b.registeredAtRaw - a.registeredAtRaw);

            document.getElementById('count-pending').innerText = pending.length;
            document.getElementById('count-active').innerText = active.length;

            document.getElementById('pending-list').innerHTML = pending.map(r => `
                <div class="p-4 bg-slate-50 rounded-xl flex justify-between items-center text-left border border-slate-100">
                    <div class="overflow-hidden">
                        <div class="font-bold truncate">${r.name} (${r.company})</div>
                        <div class="text-xs text-blue-600 mt-1">受訪：${r.host} | 目的：${r.purpose}</div>
                    </div>
                    <button onclick="checkIn('${r.id}')" class="bg-orange-500 text-white px-3 py-1.5 rounded-lg text-xs font-bold shrink-0 ml-2">發證</button>
                </div>
            `).join('') || '<p class="text-center text-slate-300 py-8 italic text-sm">暫無登記紀錄</p>';

            document.getElementById('active-list').innerHTML = active.map(r => `
                <div class="p-4 bg-blue-50/50 border border-blue-100 rounded-xl flex justify-between items-center text-left">
                    <div class="flex items-center overflow-hidden">
                        <div class="bg-blue-600 text-white w-10 h-10 rounded-lg flex items-center justify-center font-mono font-bold mr-3 shrink-0">${r.visitorCardId}</div>
                        <div class="overflow-hidden">
                            <div class="font-bold truncate">${r.name}</div>
                            <div class="text-[10px] text-blue-500">入：${r.checkInTime ? r.checkInTime.split(' ')[1] : ''}</div>
                        </div>
                    </div>
                    <button onclick="checkOut('${r.id}')" class="bg-white border text-slate-600 px-3 py-1.5 rounded-lg font-bold text-xs shrink-0">簽退</button>
                </div>
            `).join('') || '<p class="text-center text-slate-300 py-8 italic text-sm">目前場內無訪客</p>';

            document.getElementById('history-table').innerHTML = history.map(r => `
                <tr class="hover:bg-slate-50 transition-colors text-left text-xs">
                    <td class="px-4 py-3 font-mono font-bold text-slate-400">${r.visitorCardId || '-'}</td>
                    <td class="px-4 py-3 font-bold">${r.name}</td>
                    <td class="px-4 py-3 text-slate-500">${r.company}</td>
                    <td class="px-4 py-3 text-slate-700">${r.host}</td>
                    <td class="px-4 py-3">${r.purpose}</td>
                    <td class="px-4 py-3 font-mono text-slate-600">'${r.phone}</td>
                    <td class="px-4 py-3 text-slate-400">${r.checkInTime || '-'}</td>
                    <td class="px-4 py-3 font-bold">${r.checkOutTime || '<span class="text-blue-500">在場內</span>'}</td>
                </tr>
            `).join('');
        }

        window.checkIn = async (id) => {
            const card = prompt("請輸入發放的訪客證號 (例如: V-001):");
            if(!card) return;
            const data = { status: 'active', visitorCardId: card, checkInTime: new Date().toLocaleString('zh-TW', { hour12: false }), checkInTimeRaw: Date.now() };
            if(isCloud) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'visitorRecords', id), data);
            else { 
                let r = JSON.parse(localStorage.getItem('visitorRecords')); 
                let i = r.findIndex(x=>x.id===id); 
                r[i]={...r[i],...data}; 
                localStorage.setItem('visitorRecords', JSON.stringify(r)); 
                window.dispatchEvent(new Event('storage')); 
            }
        };

        window.checkOut = async (id) => {
            const data = { status: 'completed', checkOutTime: new Date().toLocaleString('zh-TW', { hour12: false }), checkOutTimeRaw: Date.now() };
            if(isCloud) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'visitorRecords', id), data);
            else { 
                let r = JSON.parse(localStorage.getItem('visitorRecords')); 
                let i = r.findIndex(x=>x.id===id); 
                r[i]={...r[i],...data}; 
                localStorage.setItem('visitorRecords', JSON.stringify(r)); 
                window.dispatchEvent(new Event('storage')); 
            }
        };

        window.openQRModal = () => {
            document.getElementById('qr-modal').classList.remove('hidden');
            const qr = document.getElementById('qrcode'); 
            qr.innerHTML = "";
            // 自動偵測路徑並指向 visitor.html
            const targetUrl = window.location.href.replace('admin.html', 'visitor.html');
            new QRCode(qr, { text: targetUrl, width: 200, height: 200 });
        };

        window.exportToCSV = () => {
            if (!records.length) return;
            let csv = "\ufeff證號,姓名,公司,受訪同仁,目的,電話,進入時間,簽退時間\n";
            records.forEach(r => {
                csv += `"${r.visitorCardId||''}","${r.name}","${r.company}","${r.host}","${r.purpose}","'${r.phone}","${r.checkInTime||''}","${r.checkOutTime||''}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `訪客紀錄_${new Date().toLocaleDateString()}.csv`;
            a.click();
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>櫃台管理系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; background: #f1f5f9; }
  </style>
</head>
<body class="min-h-screen p-6">

  <div class="max-w-4xl mx-auto">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-3xl font-black text-slate-800">🏢 櫃台管理</h1>
      <button onclick="loadVisitors()" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold text-sm">重新整理</button>
    </div>

    <!-- 待確認 -->
    <div class="mb-8">
      <h2 class="text-lg font-black text-amber-600 mb-3">⏳ 待確認</h2>
      <div id="pending-list" class="space-y-3">
        <p class="text-slate-400 text-sm">載入中...</p>
      </div>
    </div>

    <!-- 已確認 -->
    <div>
      <h2 class="text-lg font-black text-emerald-600 mb-3">✅ 已核准</h2>
      <div id="approved-list" class="space-y-3">
        <p class="text-slate-400 text-sm">載入中...</p>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://diqvsjmlsqgukuptohzh.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpcXZzam1sc3FndWt1cHRvaHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NzI1MDksImV4cCI6MjA5MTM0ODUwOX0.0fVBmdnKUkdkevingScguHafHpcSmCcMOtZug5SgQjo";
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function formatTime(ts) {
      return new Date(ts).toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' });
    }

    function visitorCard(v, showApprove) {
      const id = 'V-' + String(v.id).padStart(6, '0');
      return `
        <div class="bg-white rounded-2xl p-5 shadow border border-slate-100 flex items-center justify-between gap-4">
          <div class="flex-1">
            <div class="flex items-center gap-2 mb-1">
              <span class="font-mono text-xs text-slate-400">${id}</span>
              <span class="text-xs text-slate-400">${formatTime(v.created_at)}</span>
            </div>
            <div class="font-black text-slate-800 text-lg">${v.name} <span class="text-sm font-bold text-slate-400">${v.company}</span></div>
            <div class="text-sm text-slate-500 mt-1">受訪：<b>${v.host}</b>　目的：${v.purpose}</div>
            <div class="text-sm text-slate-500">電話：${v.phone}</div>
          </div>
          ${showApprove ? `
          <button onclick="approve(${v.id})" class="bg-emerald-500 hover:bg-emerald-600 text-white font-black px-5 py-3 rounded-xl whitespace-nowrap">
            核准入場
          </button>` : `<span class="text-emerald-500 font-black text-sm">已核准</span>`}
        </div>`;
    }

    async function loadVisitors() {
      const { data } = await client.from('visitors').select('*').order('created_at', { ascending: false });

      const pending = data.filter(v => v.status === '待確認');
      const approved = data.filter(v => v.status !== '待確認');

      document.getElementById('pending-list').innerHTML = pending.length
        ? pending.map(v => visitorCard(v, true)).join('')
        : '<p class="text-slate-400 text-sm">目前沒有待確認的訪客</p>';

      document.getElementById('approved-list').innerHTML = approved.length
        ? approved.map(v => visitorCard(v, false)).join('')
        : '<p class="text-slate-400 text-sm">尚無已核准記錄</p>';
    }

    async function approve(id) {
      await client.from('visitors').update({ status: '已核准' }).eq('id', id);
      loadVisitors();
    }

    // 自動每5秒更新
    loadVisitors();
    setInterval(loadVisitors, 5000);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>櫃台管理系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; background: #f1f5f9; }
  </style>
</head>
<body class="min-h-screen p-6">

  <div class="max-w-4xl mx-auto">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-3xl font-black text-slate-800">🏢 櫃台管理</h1>
      <button onclick="loadVisitors()" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold text-sm">重新整理</button>
    </div>

    <!-- 刷卡發卡區 -->
    <div class="bg-white rounded-2xl p-5 shadow border border-emerald-100 mb-4">
      <h2 class="text-lg font-black text-emerald-600 mb-3">🪪 刷卡發卡（自動核准最早訪客）</h2>
      <div class="flex gap-3">
        <input type="text" id="assign-input" class="flex-1 border-2 border-slate-200 rounded-xl px-4 py-3 font-bold focus:outline-none focus:border-emerald-400" placeholder="刷卡...">
      </div>
      <div id="assign-msg" class="mt-2 text-sm font-bold hidden"></div>
    </div>

    <!-- 刷卡簽退區 -->
    <div class="bg-white rounded-2xl p-5 shadow border border-blue-100 mb-8">
      <h2 class="text-lg font-black text-blue-600 mb-3">🚪 刷卡簽退</h2>
      <div class="flex gap-3">
        <input type="text" id="card-input" class="flex-1 border-2 border-slate-200 rounded-xl px-4 py-3 font-bold focus:outline-none focus:border-blue-400" placeholder="刷卡...">
      </div>
      <div id="card-msg" class="mt-2 text-sm font-bold hidden"></div>
    </div>

    <!-- 待確認 -->
    <div class="mb-8">
      <h2 class="text-lg font-black text-amber-600 mb-3">⏳ 待確認</h2>
      <div id="pending-list" class="space-y-3">
        <p class="text-slate-400 text-sm">載入中...</p>
      </div>
    </div>

    <!-- 在場中 -->
    <div class="mb-8">
      <h2 class="text-lg font-black text-emerald-600 mb-3">✅ 在場中</h2>
      <div id="approved-list" class="space-y-3">
        <p class="text-slate-400 text-sm">載入中...</p>
      </div>
    </div>

    <!-- 已離場 -->
    <div>
      <h2 class="text-lg font-black text-slate-400 mb-3">🚪 已離場</h2>
      <div id="checkout-list" class="space-y-3">
        <p class="text-slate-400 text-sm">載入中...</p>
      </div>
    </div>
  </div>

  <script>
    function formatTime(ts) {
      if (!ts) return '-';
      return new Date(ts).toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' });
    }

    function pendingCard(v) {
      const id = 'V-' + String(v.id).padStart(6, '0');
      return `
        <div class="bg-white rounded-2xl p-5 shadow border border-amber-100 flex items-center justify-between gap-4">
          <div class="flex-1">
            <div class="flex items-center gap-2 mb-1">
              <span class="font-mono text-xs text-slate-400">${id}</span>
              <span class="text-xs text-slate-400">${formatTime(v.created_at)}</span>
            </div>
            <div class="font-black text-slate-800 text-lg">${v.name} <span class="text-sm font-bold text-slate-400">${v.company}</span></div>
            <div class="text-sm text-slate-500 mt-1">受訪：<b>${v.host}</b>　目的：${v.purpose}</div>
            <div class="text-sm text-slate-500">電話：${v.phone}</div>
          </div>
        </div>`;
    }

    function approvedCard(v) {
      const id = 'V-' + String(v.id).padStart(6, '0');
      return `
        <div class="bg-white rounded-2xl p-5 shadow border border-emerald-100 flex items-center justify-between gap-4">
          <div class="flex-1">
            <div class="flex items-center gap-2 mb-1">
              <span class="font-mono text-xs text-slate-400">${id}</span>
              <span class="text-xs text-slate-400">入場：${formatTime(v.created_at)}</span>
              ${v.card_number ? `<span class="bg-blue-100 text-blue-600 font-black text-xs px-2 py-0.5 rounded-lg">卡號：${v.card_number}</span>` : ''}
            </div>
            <div class="font-black text-slate-800 text-lg">${v.name} <span class="text-sm font-bold text-slate-400">${v.company}</span></div>
            <div class="text-sm text-slate-500 mt-1">受訪：<b>${v.host}</b>　目的：${v.purpose}</div>
            <div class="text-sm text-slate-500">電話：${v.phone}</div>
          </div>
          <button onclick="checkout(${v.id})" class="bg-slate-600 hover:bg-slate-700 text-white font-black px-5 py-3 rounded-xl whitespace-nowrap">
            簽退離場
          </button>
        </div>`;
    }

    function checkoutCard(v) {
      const id = 'V-' + String(v.id).padStart(6, '0');
      return `
        <div class="bg-white rounded-2xl p-4 shadow border border-slate-100 flex items-center justify-between gap-4 opacity-60">
          <div class="flex-1">
            <div class="flex items-center gap-2 mb-1">
              <span class="font-mono text-xs text-slate-400">${id}</span>
              ${v.card_number ? `<span class="text-xs text-slate-400">卡號：${v.card_number}</span>` : ''}
            </div>
            <div class="font-bold text-slate-600">${v.name} <span class="text-sm font-bold text-slate-400">${v.company}</span></div>
            <div class="text-xs text-slate-400 mt-1">入場：${formatTime(v.created_at)}　離場：${formatTime(v.checkout_at)}</div>
          </div>
          <span class="text-slate-400 font-black text-sm">已離場</span>
        </div>`;
    }

    async function loadVisitors() {
      const res = await fetch('/api/visitors');
      const data = await res.json();

      const pending = data.filter(v => v.status === '待確認');
      const approved = data.filter(v => v.status === '已核准' && !v.checkout_at);
      const checkedout = data.filter(v => v.checkout_at);

      document.getElementById('pending-list').innerHTML = pending.length
        ? pending.map(pendingCard).join('')
        : '<p class="text-slate-400 text-sm">目前沒有待確認的訪客</p>';

      document.getElementById('approved-list').innerHTML = approved.length
        ? approved.map(approvedCard).join('')
        : '<p class="text-slate-400 text-sm">目前沒有在場訪客</p>';

      document.getElementById('checkout-list').innerHTML = checkedout.length
        ? checkedout.map(checkoutCard).join('')
        : '<p class="text-slate-400 text-sm">尚無離場記錄</p>';
    }

    async function assignCard() {
      const card_number = document.getElementById('assign-input').value.trim();
      if (!card_number) return;
      const res = await fetch('/api/assign', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ card_number })
      });
      document.getElementById('assign-input').value = '';
      const msg = document.getElementById('assign-msg');
      msg.classList.remove('hidden', 'text-red-500', 'text-emerald-600');
      if (res.ok) {
        msg.classList.add('text-emerald-600');
        msg.textContent = '✅ 發卡成功，已核准入場';
      } else {
        msg.classList.add('text-red-500');
        msg.textContent = '❌ 目前沒有待確認的訪客';
      }
      setTimeout(() => msg.classList.add('hidden'), 3000);
      loadVisitors();
    }

    async function checkout(id) {
      await fetch('/api/checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      });
      loadVisitors();
    }

    async function cardCheckout() {
      const card_number = document.getElementById('card-input').value.trim();
      if (!card_number) return;
      await fetch('/api/checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ card_number })
      });
      document.getElementById('card-input').value = '';
      const msg = document.getElementById('card-msg');
      msg.classList.remove('hidden', 'text-red-500', 'text-emerald-600');
      msg.classList.add('text-emerald-600');
      msg.textContent = '✅ 簽退成功';
      setTimeout(() => msg.classList.add('hidden'), 3000);
      loadVisitors();
    }

    document.getElementById('assign-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') assignCard();
    });

    document.getElementById('card-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') cardCheckout();
    });

    loadVisitors();
    setInterval(loadVisitors, 5000);
  </script>
</body>
</html>

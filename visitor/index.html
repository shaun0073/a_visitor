<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訪客登記系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; background: #f8fafc; }
    .form-input { border: 2px solid #e2e8f0; transition: all 0.3s; }
    .form-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59,130,246,0.1); outline: none; }
    .success-checkmark { width: 60px; height: 60px; margin: 0 auto; stroke: #10b981; stroke-width: 3; stroke-dasharray: 48; stroke-dashoffset: 48; animation: stroke 0.6s ease forwards; }
    @keyframes stroke { 100% { stroke-dashoffset: 0; } }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl p-8 border border-slate-100 relative overflow-hidden">

    <!-- 表單 -->
    <div id="step-form">
      <div class="text-center mb-8">
        <div class="inline-block p-4 bg-blue-50 rounded-2xl mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
        </div>
        <h1 class="text-3xl font-black text-slate-800">訪客登記</h1>
        <p class="text-slate-500 mt-1">請填寫您的到訪資訊</p>
      </div>

      <div class="space-y-4">
        <input type="text" id="name" class="form-input w-full px-4 py-4 rounded-2xl font-bold" placeholder="您的姓名 *">
        <input type="tel" id="phone" class="form-input w-full px-4 py-4 rounded-2xl font-bold" placeholder="聯絡電話 *">
        <input type="text" id="company" class="form-input w-full px-4 py-4 rounded-2xl font-bold" placeholder="所屬公司 *">
        <div class="grid grid-cols-2 gap-4">
          <input type="text" id="host" class="form-input w-full px-4 py-4 rounded-2xl font-bold text-sm" placeholder="受訪人 *">
          <select id="purpose" onchange="toggleOther()" class="form-input w-full px-4 py-4 rounded-2xl font-bold text-sm bg-white">
            <option value="" disabled selected>入廠目的</option>
            <option value="商務洽談">商務洽談</option>
            <option value="應徵面試">應徵面試</option>
            <option value="設備維修">設備維修</option>
            <option value="領取包裹">領取包裹</option>
            <option value="其他">其他</option>
          </select>
        </div>
        <div id="other-container" class="hidden">
          <input type="text" id="other-purpose" placeholder="請註明目的..." class="w-full bg-blue-50 p-4 rounded-2xl font-bold border-2 border-blue-100">
        </div>
        <button onclick="submitForm()" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-xl mt-2">
          確認送出
        </button>
      </div>
    </div>

    <!-- 審核中 -->
    <div id="step-pending" class="hidden text-center py-6">
      <div class="relative w-20 h-20 mx-auto mb-6">
        <div class="absolute inset-0 border-4 border-amber-500 border-t-transparent rounded-full animate-spin"></div>
      </div>
      <h2 class="text-2xl font-black text-slate-800 mb-2">資料審核中</h2>
      <p class="text-slate-500 mb-4">請稍候，接待人員確認後即可入場</p>
      <div class="bg-slate-50 rounded-2xl p-6 border border-slate-100">
        <div class="text-[10px] text-slate-400 font-black uppercase mb-1">訪客證號</div>
        <div id="visitor-id-display" class="text-3xl font-mono font-black text-blue-600">---</div>
      </div>
    </div>

    <!-- 成功 -->
    <div id="step-success" class="hidden text-center py-4">
      <svg class="success-checkmark mb-4" viewBox="0 0 52 52">
        <circle cx="26" cy="26" r="25" fill="none" stroke="#10b981" stroke-width="3"/>
        <path fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
      </svg>
      <h2 class="text-2xl font-black text-emerald-600 mb-1">審核成功</h2>
      <div class="my-6">
        <img id="qr-image" src="" alt="QR" class="w-40 h-40 mx-auto">
        <div id="success-id-display" class="mt-3 font-mono font-black text-lg text-slate-700">---</div>
      </div>
      <button onclick="location.reload()" class="w-full bg-slate-800 text-white font-black py-4 rounded-2xl">完成</button>
    </div>

    <!-- Loading -->
    <div id="loading" class="hidden absolute inset-0 bg-white/90 z-50 flex items-center justify-center">
      <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://diqvsjmlsqgukuptohzh.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpcXZzam1sc3FndWt1cHRvaHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NzI1MDksImV4cCI6MjA5MTM0ODUwOX0.0fVBmdnKUkdkevingScguHafHpcSmCcMOtZug5SgQjo";
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let pollInterval = null;

    function toggleOther() {
      const isOther = document.getElementById('purpose').value === '其他';
      document.getElementById('other-container').classList.toggle('hidden', !isOther);
    }

    async function submitForm() {
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const company = document.getElementById('company').value.trim();
      const host = document.getElementById('host').value.trim();
      const purposeVal = document.getElementById('purpose').value;
      const purpose = purposeVal === '其他' ? `其他：${document.getElementById('other-purpose').value}` : purposeVal;

      if (!name || !phone || !company || !host || !purpose) {
        alert('請填寫所有欄位');
        return;
      }

      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('submitBtn').disabled = true;

      const { data, error } = await client.from('visitors').insert([
        { name, phone, company, host, purpose, status: '待確認' }
      ]).select();

      document.getElementById('loading').classList.add('hidden');

      if (error) {
        alert('送出失敗：' + error.message);
        document.getElementById('submitBtn').disabled = false;
        return;
      }

      const id = String(data[0].id).padStart(6, '0');
      document.getElementById('step-form').classList.add('hidden');
      document.getElementById('step-pending').classList.remove('hidden');
      document.getElementById('visitor-id-display').innerText = 'V-' + id;
      startPolling(data[0].id, 'V-' + id);
    }

    function startPolling(rowId, displayId) {
      pollInterval = setInterval(async () => {
        const { data } = await client.from('visitors').select('status').eq('id', rowId).single();
        if (data && data.status !== '待確認') {
          clearInterval(pollInterval);
          document.getElementById('qr-image').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(displayId)}`;
          document.getElementById('success-id-display').innerText = displayId;
          document.getElementById('step-pending').classList.add('hidden');
          document.getElementById('step-success').classList.remove('hidden');
        }
      }, 3000);
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訪客登記系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { background-color: #f8fafc; font-family: 'Noto Sans TC', sans-serif; overflow-x: hidden; }
        
        /* 右上角分享 QR Code 區塊 - 強制顯示邏輯 */
        .share-qr-box { 
            position: fixed; 
            top: 20px; 
            right: 20px; 
            text-align: center; 
            z-index: 1000; 
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 1 !important; /* 強制不透明 */
        }
        .share-qr-img { 
            background: white;
            padding: 8px; 
            border-radius: 16px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
            border: 1px solid #e2e8f0; 
            width: 100px; 
            height: 100px; 
            display: block;
        }
        .share-text {
            font-size: 10px;
            font-weight: 900;
            color: #64748b;
            margin-top: 4px;
            background: rgba(255, 255, 255, 0.9);
            padding: 2px 8px;
            border-radius: 6px;
        }

        .form-input { border: 2px solid #e2e8f0; transition: all 0.3s ease; }
        .form-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); outline: none; }
        .step-transition { transition: opacity 0.4s ease; }
        
        .success-checkmark { width: 60px; height: 60px; margin: 0 auto; stroke: #10b981; stroke-width: 3; stroke-dasharray: 48; stroke-dashoffset: 48; animation: stroke 0.6s ease forwards; }
        @keyframes stroke { 100% { stroke-dashoffset: 0; } }

        @media (max-width: 640px) {
            .share-qr-box { top: 10px; right: 10px; scale: 0.8; transform-origin: top right; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative">

    <!-- 關鍵：由 GAS 直接注入變數 -->
    <script>
      // 如果 scriptUrl 為空，這行會變成 var rawUrl = "";
      var rawUrl = "<?= scriptUrl ?>";
    </script>

    <!-- 右上角 QR Code -->
    <div class="share-qr-box" id="share-container">
        <img id="share-qr" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=loading" alt="掃描登記" class="share-qr-img">
        <div class="share-text uppercase tracking-widest">掃描登記</div>
    </div>

    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl p-8 border border-slate-100 relative overflow-hidden">
        
        <!-- 表單步驟 1 -->
        <div id="step-form">
            <div class="text-center mb-8">
                <div class="inline-block p-4 bg-blue-50 rounded-2xl mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">訪客登記</h1>
                <p class="text-slate-500 font-medium mt-1">請填寫您的到訪資訊</p>
            </div>

            <form id="visitorForm" onsubmit="handleSubmit(event)" class="space-y-4">
                <input type="text" name="name" required class="form-input w-full px-4 py-4 rounded-2xl font-bold" placeholder="您的姓名">
                <input type="tel" name="phone" required class="form-input w-full px-4 py-4 rounded-2xl font-bold" placeholder="聯絡電話">
                <input type="text" name="company" required class="form-input w-full px-4 py-4 rounded-2xl font-bold" placeholder="所屬公司">
                
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" name="host" required class="form-input w-full px-4 py-4 rounded-2xl font-bold text-sm" placeholder="受訪人">
                    <select name="purpose" id="v-purp" onchange="toggleOtherPurpose()" class="form-input w-full px-4 py-4 rounded-2xl font-bold text-sm bg-white">
                        <option value="" disabled selected>入廠目的</option>
                        <option value="商務洽談">商務洽談</option>
                        <option value="應徵面試">應徵面試</option>
                        <option value="設備維修">設備維修</option>
                        <option value="領取包裹">領取包裹</option>
                        <option value="其他">其他</option>
                    </select>
                </div>

                <div id="v-purp-other-container" class="hidden">
                    <input type="text" id="v-purp-other" placeholder="請註明目的..." class="w-full bg-blue-50 p-4 rounded-2xl font-bold border-2 border-blue-100">
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-xl mt-6">
                    確認送出
                </button>
            </form>
        </div>

        <!-- 審核中 -->
        <div id="step-pending" class="hidden text-center py-6">
            <div class="relative w-20 h-20 mx-auto mb-6">
                <div class="absolute inset-0 border-4 border-amber-500 border-t-transparent rounded-full animate-spin"></div>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-2">資料審核中</h2>
            <div class="bg-slate-50 rounded-2xl p-6 border border-slate-100">
                <div class="text-[10px] text-slate-400 font-black uppercase mb-1">訪客證號</div>
                <div id="visitor-id-display" class="text-3xl font-mono font-black text-blue-600">---</div>
            </div>
        </div>

        <!-- 成功 -->
        <div id="step-success" class="hidden text-center py-4">
            <svg class="success-checkmark mb-4" viewBox="0 0 52 52">
                <circle cx="26" cy="26" r="25" fill="none" stroke="#10b981" stroke-width="3"/>
                <path fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
            </svg>
            <h2 class="text-2xl font-black text-emerald-600 mb-1">審核成功</h2>
            <div class="my-6">
                <div class="qr-container">
                    <img id="qr-image" src="" alt="QR" class="w-40 h-40 mx-auto">
                </div>
                <div id="success-id-display" class="mt-3 font-mono font-black text-lg">---</div>
            </div>
            <button onclick="location.reload()" class="w-full bg-slate-800 text-white font-black py-4 rounded-2xl">完成</button>
        </div>

        <!-- Loading -->
        <div id="loadingOverlay" class="hidden absolute inset-0 bg-white/90 z-50 flex items-center justify-center">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent"></div>
        </div>
    </div>

    <script>
        let pollInterval = null;

        // 初始化 QR Code 的關鍵邏輯
        function setupShareQR() {
            let targetUrl = "";
            
            // 優先權 1: 檢查 GAS 注入
            if (typeof rawUrl !== 'undefined' && rawUrl.length > 10) {
                targetUrl = rawUrl;
            } 
            // 優先權 2: 檢查當前瀏覽器網址 (避免 iframe 影響)
            else {
                targetUrl = window.location.href;
            }

            const qrImg = document.getElementById('share-qr');
            if (targetUrl) {
                // 強制生成
                qrImg.src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(targetUrl);
                console.log("QR Code URL Generated:", targetUrl);
            }
        }

        window.onload = setupShareQR;

        function toggleOtherPurpose() {
            const isOther = document.getElementById("v-purp").value === "其他";
            document.getElementById("v-purp-other-container").classList.toggle("hidden", !isOther);
            if (isOther) document.getElementById("v-purp-other").focus();
        }

        function handleSubmit(event) {
            event.preventDefault();
            const form = event.target;
            document.getElementById('loadingOverlay').classList.remove('hidden');

            const formData = {
                name: form.name.value,
                phone: form.phone.value,
                company: form.company.value,
                host: form.host.value,
                purpose: (form.purpose.value === "其他") ? `其他：${document.getElementById("v-purp-other").value}` : form.purpose.value
            };

            if (typeof google !== 'undefined') {
                google.script.run
                    .withSuccessHandler(res => {
                        document.getElementById('loadingOverlay').classList.add('hidden');
                        if (res.success) {
                            document.getElementById('step-form').classList.add('hidden');
                            document.getElementById('step-pending').classList.remove('hidden');
                            document.getElementById('visitor-id-display').innerText = res.id;
                            document.getElementById('share-container').style.display = 'none'; // 提交後隱藏
                            startPolling(res.id);
                        }
                    })
                    .saveVisitorRecord(formData);
            }
        }

        function startPolling(id) {
            pollInterval = setInterval(() => {
                google.script.run
                    .withSuccessHandler(status => {
                        if (status && status !== "待確認" && status !== "查無資料") {
                            clearInterval(pollInterval);
                            document.getElementById('qr-image').src = "https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=" + encodeURIComponent(id);
                            document.getElementById('success-id-display').innerText = id;
                            document.getElementById('step-pending').classList.add('hidden');
                            document.getElementById('step-success').classList.remove('hidden');
                        }
                    })
                    .checkVisitorStatus(id);
            }, 3000);
        }
    </script>
</body>
</html>
